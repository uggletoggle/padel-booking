name: padelbooking

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: padelbooking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak-db:
    image: postgres:17-alpine
    container_name: padelbooking-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: padelbooking-keycloak
    command: start-dev
    environment:
      KC_HOSTNAME: auth.padel-booking.duckdns.org
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: padelbooking-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PadelBookingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      Keycloak__Authority: "https://auth.padel-booking.duckdns.org/realms/padelbooking"
      Keycloak__Audience: "padelbooking-api"
      Keycloak__AdminClientId: "admin-keycloak-id"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-admin-secret}"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      keycloak:
        condition: service_started

  admin:
    build:
      context: ../PadelBookingAdmin
      dockerfile: Dockerfile
    container_name: padelbooking-admin
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Keycloak__Authority: "https://auth.padel-booking.duckdns.org/realms/padelbooking"
      Keycloak__MetadataAddress: "https://auth.padel-booking.duckdns.org/realms/padelbooking/.well-known/openid-configuration"
      Keycloak__ClientId: "padelbooking-admin"
      Keycloak__ClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-admin-secret}"
      Keycloak__RequireHttpsMetadata: "false"
      ApiConfigs__PadelApi: "http://api:8080"
    ports:
      - "5001:8080"
    depends_on:
      - api
      - keycloak

  caddy:
    image: caddy:2-alpine
    container_name: padelbooking-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin
      - keycloak
volumes:
  sqlserver-data:
  keycloak-db-data:
  caddy_data:      # Importante para persistir certificados
  caddy_config:


  